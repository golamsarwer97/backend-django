<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <header>
        <h1>My Website</h1>
        {% if request.user.is_authenticated %}
        <p>Welcome, {{ request.user.username }} | Email: {{ request.user.email }}</p>
        <a href="{% url 'home' %}">Home</a> |
        <a href="{% url 'account' %}">Account</a> | <a href="{% url 'logout' %}">Logout</a>
        {% else %}
        <p><a href="{% url 'home' %}">Home</a> | <a href="{% url 'register' %}">Register</a> |

            <a href="{% url 'login' %}">Login</a>
        </p>
        {% endif %}
        <hr>
    </header>
    <main>
        <h2> This will showcase django projects </h2>
        {% block content %}
        {% endblock %}
    </main>
    <footer>
        <p>Copyright &copy; 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
